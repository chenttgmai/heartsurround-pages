    <p>心动围城是一款本地运行的互动剧情应用。当前版本不要求注册账号，不包含内购、广告、第三方分析 SDK 或用户追踪。</p>
    <p>应用内的剧情进度、角色好感、存档、设置和解锁状态仅保存在你的设备本地，用于提供继续游玩、回放和个性化阅读体验。</p>

    <p>如果后续版本新增联网、账号、云同步或第三方服务，我们会在发布前更新本政策并在 App Store 隐私信息中说明。</p>
